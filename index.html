<script>
window.ULTRA3_ENGINE = {
    state: "ACTIVE",
    mode: "REAL-LIVE",
    version: "3.0 TRUE FULL",

    core: "ULTRAKERN.me",
    meta: "ULTRAMETA.me",
    source: "ULTRASOURCE.me",

    pipe: ["h1","e3","o6","o9","b12","w128","win∞"],
    axis: ["X","Y","Z","U","V","W"],
    vector: ["horizont","breite","tiefe","ultra","wert"],

    chain: [
        "h1","e3","o6","o9","b12","w128",
        "nano","atom","raw","operator",
        "rev1.0","beat∞","win∞",
        "xarg","ghosterror","7sinn"
    ],

    fusion: "win∞(rev1.0(beat∞(o9(o6(e3(h1(x)))))))",

    zero: ["ZEROABSOLUT.me","PRIMEZERO.me","zero-core"],

    html_matrix: [
        "1.html","3.html","6.html","9.html","12.html",
        "RAUM3.html","698869.html","gitter.html","cluster.html"
    ],

    rooms: [
        "ROOM.main.room",
        "ROOM.raw.room",
        "ME-NC3x3.room",
        "ME-NC6eM6D.room",
        "ME-NC9x9.room"
    ],

    meta_rooms: [
        "METAh.room","METAb.room","METAt.room",
        "META360.room","META2.room","META3.room"
    ],

    octa3: ["server","web","net","script","js","html","css","dom"],
    help: ["help.me","error.me","ghost.me"],

    pcta3: "24X",
    recall: ">=91%",

    /* ---------------------------------------------------------
       SYSTEM CHECK – prüft ALLE Stationen, Engines, JSON-Lieferanten
       ohne index.html zu verändern
    --------------------------------------------------------- */
    system_check: async function () {

        const report = [];

        /* JSON-Lieferanten */
        const jsonSources = {
            tria: "tria.json",
            respo: "respo.json",
            axi: "axi.json",
            tem: "TEM.id.json"
        };

        for (const key in jsonSources) {
            try {
                await fetch(jsonSources[key]).then(r => r.json());
                report.push({ name: key, type: "JSON", status: "OK" });
            } catch {
                report.push({ name: key, type: "JSON", status: "FEHLT" });
            }
        }

        /* Engine-Lieferanten */
        const engines = {
            ultra: window.ULTRA3_ENGINE,
            respo_engine: window.RESPO_ENGINE,
            axi_engine: window.AXI_ENGINE,
            uroom: window.uROOM,
            zoom: window.ZOOM,
            tria_axiom: window.TRIA_AXIOM,
            sym: window.SYM_ENGINE,
            run8: window.RUN8_KERNEL
        };

        for (const key in engines) {
            const mod = engines[key];
            report.push({
                name: key,
                type: "ENGINE",
                status: mod ? "OK" : "FEHLT"
            });
        }

        console.table(report);
        return report;
    }
};
</script>
