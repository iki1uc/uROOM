<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ME – 6D CUBE</title>

<style>
body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: monospace;
    color: #fff;
}

/* 6D Scene */
.scene {
    width: 300px;
    height: 300px;
    perspective: 900px; /* GPU depth */
}

/* Cube Container */
.cube {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: rotateCube 12s infinite linear;
}

/* General Face Style */
.face {
    position: absolute;
    width: 300px;
    height: 300px;
    border: 2px solid #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    background: rgba(255,255,255,0.05);
}

/* 6D Faces */
.front  { transform: rotateY(  0deg) translateZ(150px); }
.back   { transform: rotateY(180deg) translateZ(150px); }
.right  { transform: rotateY( 90deg) translateZ(150px); }
.left   { transform: rotateY(-90deg) translateZ(150px); }
.top    { transform: rotateX( 90deg) translateZ(150px); }
.bottom { transform: rotateX(-90deg) translateZ(150px); }

/* Rotation */
@keyframes rotateCube {
    from { transform: rotateX(0deg) rotateY(0deg); }
    to   { transform: rotateX(360deg) rotateY(360deg); }
}
</style>
</head>

<body>

<div class="scene">
    <div class="cube">

        <div class="face front">ME – D1 Ursprung</div>
        <div class="face back">U – D2 Achse</div>
        <div class="face right">EU – D3 Raum</div>
        <div class="face left">
